[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for SMTP (Zoho Mail - India region)
# Set these in your Netlify dashboard under Site settings > Environment variables
